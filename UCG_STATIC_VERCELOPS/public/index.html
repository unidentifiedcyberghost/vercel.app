<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>UCG Cyber OS</title>
<style>
body{margin:0;background:black;color:#00ffcc;font-family:monospace}
.center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}
.panel{border:1px solid #00ffcc33;padding:10px;margin:10px}
input{background:black;border:1px solid #00ffcc;color:#00ffcc;padding:6px;margin:4px}
button{background:#00ffcc;border:none;padding:6px}
</style>
</head>
<body>

<div id="boot" class="center"><pre>UCG CYBER OS
BOOTING SYSTEM...</pre></div>

<div id="login" class="center" style="display:none">
<h3>LOGIN</h3>
<input id="u" placeholder="admin">
<input id="p" type="password" placeholder="pass">
<button onclick="go()">ENTER</button>
</div>

<div id="dash" style="display:none">
<h1>🌍 Cyber Threat Center</h1>
<div class="panel">Threats: <span id="c">0</span></div>
<div class="panel" id="log"></div>
</div>

<script>
setTimeout(()=>{boot.style.display='none';login.style.display='block'},2000);
function go(){
 if(u.value==='admin'&&p.value==='pass'){
  login.style.display='none';dash.style.display='block';
  const ws=new WebSocket('wss://YOUR_BACKEND_URL');
  let n=0;
  ws.onmessage=e=>{
   const d=JSON.parse(e.data);n++;c.innerText=n;
   const div=document.createElement('div');
   div.innerText=`${d.time} ${d.source}->${d.target} ${d.type}`;
   log.prepend(div);
  }
 }
}
</script>
</body>
</html>
