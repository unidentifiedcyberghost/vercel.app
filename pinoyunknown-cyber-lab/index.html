<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PinoyUnknown Cyber Lab</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<canvas id="matrix"></canvas>

<!-- BOOT -->
<div id="boot-screen">
  <pre id="boot-text"></pre>
</div>

<!-- AUDIO -->
<audio id="boot-sound" preload="auto">
  <source src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg">
</audio>
<audio id="key-sound" preload="auto">
  <source src="https://actions.google.com/sounds/v1/foley/typewriter_key.ogg">
</audio>
<audio id="error-sound" preload="auto">
  <source src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg">
</audio>

<!-- APP -->
<div id="app" class="hidden">

  <nav>
    <span class="logo">PINOYUNKNOWN</span>
  </nav>

  <section id="map" class="hidden">
    <div class="node" data-lab="linux-basics">Linux Basics</div>
    <div class="node" data-lab="web-exploit">Web Exploitation</div>
    <div class="node" data-lab="priv-esc">Privilege Escalation</div>
  </section>

  <section id="terminal" class="hidden">
    <div id="output"></div>
    <input id="cmd" placeholder="pinoy@lab:~$" autofocus>
  </section>

</div>

<script src="js/boot.js"></script>
<script src="js/map.js"></script>
<script src="js/terminal.js"></script>

</body>
</html>
