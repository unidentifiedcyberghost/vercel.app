<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>WhiteHat-CyberLab</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box}
body{
  margin:0;
  background:#000;
  color:#00ffff;
  font-family:'Share Tech Mono',monospace;
  overflow:hidden;
}

/* ===== BOOT TERMINAL ===== */
#boot{
  position:fixed;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
}

.terminal{
  width:90%;
  max-width:1100px;
  height:80%;
  border:2px solid #00ffff;
  padding:20px;
  overflow-y:auto;
  box-shadow:0 0 80px rgba(0,255,255,.25);
}

.line{white-space:pre-wrap; line-height:1.4}
.cursor{display:inline-block;width:10px;background:#00ffff;animation:blink 1s infinite}
@keyframes blink{50%{opacity:0}}

/* ===== MAIN ===== */
#main{display:none;height:100vh;overflow-y:auto}

header{
  padding:30px;
  text-align:center;
  border-bottom:1px solid #00ffff;
}

nav{
  display:flex;
  gap:20px;
  justify-content:center;
  border-bottom:1px solid #003;
  padding:10px;
}

nav a{color:#00ffff;text-decoration:none}
nav a:hover{color:#fff}

.section{padding:30px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px}

.card{
  border:1px solid #00ffff;
  padding:20px;
  background:rgba(0,255,255,.05);
}

/* ===== LAB MAP ===== */
.map{
  display:flex;
  gap:20px;
  flex-wrap:wrap;
}
.node{
  padding:15px;
  border:1px solid #00ffff;
  cursor:pointer;
}
.node.locked{opacity:.4}

/* ===== AI TUTOR ===== */
#chat{
  border:1px solid #00ffff;
  padding:15px;
  height:300px;
  overflow-y:auto;
}
#input{
  width:100%;
  background:black;
  color:#00ffff;
  border:1px solid #00ffff;
  padding:10px;
}
</style>
</head>

<body>

<div id="boot">
  <div class="terminal" id="term"></div>
</div>

<div id="main">
  <header>
    <h1>WHITEHAT-CYBERLAB</h1>
    <p>Defensive Cybersecurity Training Platform</p>
  </header>

  <nav>
    <a href="#labs">Labs</a>
    <a href="#tutor">AI Tutor</a>
    <a href="#academy">Academy</a>
  </nav>

  <section class="section" id="labs">
    <h2>Cyber Defense Lab Map</h2>
    <div class="map">
      <div class="node">Log Analysis</div>
      <div class="node">Firewall Hardening</div>
      <div class="node">SOC Incident</div>
      <div class="node locked">Advanced Threat (Locked)</div>
    </div>
  </section>

  <section class="section" id="tutor">
    <h2>AI Cyber Tutor</h2>
    <div id="chat"></div>
    <input id="input" placeholder="Ask about cyber defense..." />
  </section>

  <section class="section" id="academy">
    <h2>Learning Tracks</h2>
    <div class="grid">
      <div class="card">Linux Hardening</div>
      <div class="card">Network Defense</div>
      <div class="card">SOC Operations</div>
      <div class="card">Threat Intelligence</div>
    </div>
  </section>
</div>

<audio id="beep" src="https://assets.mixkit.co/sfx/preview/mixkit-computer-start-2574.mp3"></audio>
<audio id="type" src="https://assets.mixkit.co/sfx/preview/mixkit-keyboard-typing-1386.mp3"></audio>

<script>
const t=document.getElementById("term");
const beep=document.getElementById("beep");
const typeS=document.getElementById("type");

function add(txt){
  const d=document.createElement("div");
  d.className="line";
  d.textContent=txt;
  t.appendChild(d);
  t.scrollTop=t.scrollHeight;
}

function type(txt,cb){
  const d=document.createElement("div");
  d.className="line";
  t.appendChild(d);
  let i=0;
  const c=document.createElement("span");
  c.className="cursor";
  (function run(){
    if(i<txt.length){
      d.textContent+=txt[i++];
      if(i%4===0)typeS.play();
      setTimeout(run,25);
    }else{
      d.appendChild(c);
      setTimeout(()=>{c.remove();cb&&cb()},300);
    }
  })();
}

beep.play();
const boot=[
"[CYBER-KERNEL] Initializing secure environment...",
"[IDENTITY] Operator: PinoyUnknown",
"[GROUP] Affiliation: Team WhiteHat",
"[MODULE] Loading cyberpunk terminal UI...",
"[NET] Web crawling engine online...",
"[NET] Mapping network topology ██████████",
"[SEC] Enabling firewall analysis modules...",
"[SEC] Activating threat monitoring...",
"[SYS] Environment hardened",
"[BOOT] Launching WhiteHat-CyberLab..."
];
let i=0;
(function bootSeq(){
  if(i<boot.length)type(boot[i++],bootSeq);
  else setTimeout(()=>{
    document.getElementById("boot").style.display="none";
    document.getElementById("main").style.display="block";
    document.body.style.overflow="auto";
  },2000);
})();

/* AI TUTOR */
const chat=document.getElementById("chat");
const input=document.getElementById("input");
const answers={
  firewall:"Firewalls protect systems by filtering traffic based on rules.",
  soc:"SOC teams monitor, detect, and respond to security incidents.",
  linux:"Linux hardening includes permissions, updates, and service control.",
  incident:"Incident response includes detection, containment, eradication, recovery."
};

input.onkeydown=e=>{
  if(e.key==="Enter"){
    const q=input.value.toLowerCase();
    chat.innerHTML+=`<div>> ${q}</div>`;
    let r="Focus on defensive security practices.";
    for(let k in answers)if(q.includes(k))r=answers[k];
    chat.innerHTML+=`<div>[AI] ${r}</div>`;
    input.value="";
    chat.scrollTop=chat.scrollHeight;
  }
};
</script>

</body>
</html>
