<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>WhiteHat-CyberLab</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root{
  --bg:#04070a;
  --panel:#0b1116;
  --cyan:#6ff6ff;
  --teal:#27e8c4;
  --green:#3bff9a;
  --muted:#7fa6ad;
  --line:rgba(111,246,255,.25);
}
*{box-sizing:border-box}
html,body{margin:0;height:100%;background:var(--bg);color:var(--cyan);font-family:ui-monospace,Menlo,Consolas,monospace;overflow:hidden}

/* CRT + scanlines */
body:before{
  content:"";position:fixed;inset:0;pointer-events:none;
  background:
    repeating-linear-gradient(180deg,rgba(255,255,255,.02) 0 1px,transparent 1px 3px),
    radial-gradient(1000px 600px at 50% 120%,rgba(39,232,196,.08),transparent 60%);
  mix-blend-mode:overlay;
}

/* BOOT */
#boot{position:fixed;inset:0;display:flex;align-items:center;justify-content:center}
.boot-grid{
  width:min(1100px,94vw);
  height:min(720px,90vh);
  display:grid;
  grid-template-columns:repeat(12,1fr);
  grid-template-rows:repeat(8,1fr);
  gap:10px;
}
.term{
  background:linear-gradient(180deg,#0b1217,#06090c);
  border:1px solid var(--line);
  border-radius:8px;
  padding:8px;
  font-size:11px;
  opacity:0;
  animation:pop .5s ease forwards;
}
@keyframes pop{to{opacity:1}}
.term-header{color:var(--muted);font-size:10px;margin-bottom:4px}
.screen{white-space:pre-wrap;line-height:1.4}

/* APP */
#app{display:none;position:fixed;inset:0;grid-template-rows:auto 1fr auto}
header{
  padding:10px 16px;
  display:flex;
  justify-content:space-between;
  border-bottom:1px solid var(--line);
  background:rgba(4,7,10,.85);
}
.brand{letter-spacing:.12em;font-weight:700}
main{display:grid;grid-template-columns:260px 1fr;gap:14px;padding:14px}
.panel{
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:10px;
  padding:12px;
}
.lab{border:1px dashed var(--line);padding:8px;border-radius:6px;margin-bottom:8px;font-size:12px}
.lab:hover{box-shadow:0 0 12px rgba(111,246,255,.25)}
.terminal{display:flex;flex-direction:column;height:100%}
.out{flex:1;overflow:auto;font-size:12px}
.prompt{display:flex;gap:6px}
.prompt input{
  flex:1;background:#020405;color:var(--green);
  border:1px solid var(--line);border-radius:5px;padding:6px
}

/* Ticker */
#ticker{
  white-space:nowrap;
  overflow:hidden;
  border-top:1px solid var(--line);
  border-bottom:1px solid var(--line);
  padding:6px 0;
  font-size:11px;
}
.ticker-track{
  display:inline-block;
  animation:scroll 25s linear infinite;
}
@keyframes scroll{from{transform:translateX(100%)}to{transform:translateX(-100%)}}

/* Footer */
footer{
  font-size:11px;
  color:var(--muted);
  display:flex;
  justify-content:space-between;
  padding:8px 14px;
  border-top:1px solid var(--line);
}
a{color:var(--cyan);text-decoration:none}
</style>
</head>

<body>

<!-- BOOT -->
<section id="boot">
  <div class="boot-grid" id="bootGrid"></div>
</section>

<!-- APP -->
<section id="app">
<header>
  <div class="brand">WhiteHat-CyberLab</div>
  <div class="muted">Operator: Team WhiteHat · Alias: PinoyUnknown</div>
</header>

<div id="ticker">
  <div class="ticker-track" id="tickerTrack"></div>
</div>

<main>
  <aside class="panel">
    <b>Blue-Team Labs</b><br><br>
    <div class="lab">Network Defense</div>
    <div class="lab">Web Hardening</div>
    <div class="lab">SOC Analysis</div>
    <div class="lab">Threat Intelligence</div>
    <div class="lab">Endpoint Security</div>
    <div class="lab">Cloud Defense</div>
  </aside>

  <section class="panel terminal">
    <div class="out" id="out"></div>
    <div class="prompt">
      <span>$</span>
      <input id="cmd" placeholder="type help">
    </div>
  </section>
</main>

<footer>
  <span>github: <a href="https://github.com/unidentifiedcyberghost" target="_blank">unidentifiedcyberghost</a></span>
  <span>instagram: <a href="https://www.instagram.com/pinoyunknown" target="_blank">pinoyunknown</a></span>
</footer>
</section>

<script>
/* ---------------- BOOT SYSTEM ---------------- */
const grid=document.getElementById("bootGrid");
const layouts=[
  ["1 / span 6","1 / span 4"],
  ["7 / span 6","1 / span 3"],
  ["7 / span 6","4 / span 3"],
  ["1 / span 4","5 / span 4"],
  ["5 / span 4","5 / span 4"],
  ["9 / span 4","7 / span 2"]
];

function term(i){
  const d=document.createElement("div");
  d.className="term";
  d.style.gridColumn=layouts[i][0];
  d.style.gridRow=layouts[i][1];
  d.innerHTML=`<div class="term-header">tty${i}</div><div class="screen"></div>`;
  grid.appendChild(d);
  return d.querySelector(".screen");
}

const logs=[
  "Kernel boot sequence initiated",
  "Memory mapping complete",
  "CPU features detected",
  "Entropy pool seeded",
  "Network interfaces online",
  "DNS resolver loaded",
  "Routing table built",
  "Traffic inspection modules ready",
  "Audit daemon started",
  "Policy engine armed",
  "Blue-team defensive stack loaded",
  "Operator authenticated: PinoyUnknown",
  "Team WhiteHat confirmed"
];

(async()=>{
  const terms=layouts.map((_,i)=>term(i));
  const start=Date.now();
  let i=0;
  while(Date.now()-start<90000){
    const t=terms[i%terms.length];
    t.textContent+=logs[i%logs.length]+"\n";
    await new Promise(r=>setTimeout(r,900));
    i++;
  }
  document.getElementById("boot").style.display="none";
  document.getElementById("app").style.display="grid";
  initApp();
})();

/* ---------------- APP ---------------- */
function print(t){out.textContent+=t+"\n";out.scrollTop=out.scrollHeight}

async function initApp(){
  print("WhiteHat-CyberLab operational.");
  const ip=await fetch("https://api.ipify.org?format=json").then(r=>r.json()).catch(()=>({ip:"N/A"}));
  print("IP Address: "+ip.ip);
  print("Platform: "+navigator.platform);
  print("CPU Threads: "+navigator.hardwareConcurrency);
  print("Resolution: "+screen.width+"x"+screen.height);
}

/* Commands */
cmd.onkeydown=e=>{
  if(e.key==="Enter"){
    const v=cmd.value;cmd.value="";
    print("$ "+v);
    if(v==="help")print("help | status | clear | labs");
    else if(v==="status")print("All defensive systems nominal.");
    else if(v==="labs")print("6 Blue-Team labs available.");
    else if(v==="clear")out.textContent="";
    else print("Command not recognized.");
  }
};

/* Ticker */
const assets=[
  ["USD","1.00","green"],
  ["BTC","68420","+1.2%"],
  ["ETH","3521","+0.8%"],
  ["SOL","142","+2.4%"]
];
document.getElementById("tickerTrack").innerHTML=
  assets.map(a=>`<span style="margin-right:40px;color:${a[2].includes('+')?'#3bff9a':'#ff6b6b'}">${a[0]} ${a[1]} ${a[2]}</span>`).join("");
</script>
</body>
</html>
