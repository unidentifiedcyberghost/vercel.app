<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cyber Academy SaaS PRO // PinoyUnknown</title>

<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: monospace;
  background: black;
  color: #00ff66;
  overflow: hidden;
}

/* MATRIX BACKGROUND */
canvas {
  position: fixed;
  inset: 0;
  z-index: 0;
}

/* HUD GRID */
#hud {
  position: fixed;
  inset: 0;
  z-index: 1;
  pointer-events: none;
  background:
    linear-gradient(rgba(0,255,102,0.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,255,102,0.05) 1px, transparent 1px);
  background-size: 40px 40px;
}

/* LAYOUT */
#app {
  position: relative;
  z-index: 2;
  display: grid;
  grid-template-columns: 1fr 1fr;
  height: 100vh;
}

/* MAP */
#map {
  border-right: 1px solid #0f3;
  padding: 10px;
}

.node {
  border: 1px solid #0f3;
  padding: 10px;
  margin: 10px 0;
  cursor: pointer;
  transition: 0.2s;
}

.node:hover {
  background: rgba(0,255,102,0.1);
}

/* TERMINAL */
#terminal {
  padding: 10px;
}

#out {
  height: 60vh;
  overflow-y: auto;
  border-bottom: 1px solid #0f3;
}

input {
  width: 100%;
  background: black;
  border: none;
  color: #00ff66;
  padding: 10px;
  outline: none;
}

/* AI PANEL */
#ai {
  border-top: 1px solid #0f3;
  padding: 10px;
  height: 25vh;
  overflow-y: auto;
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>
<div id="hud"></div>

<div id="app">

  <!-- LEFT: MAP -->
  <div id="map">
    <h3>CYBER LAB MAP</h3>

    <div class="node" onclick="openLab('node1')">NODE 01 - Beginner Lab</div>
    <div class="node" onclick="openLab('node2')">NODE 02 - Network Scan</div>
    <div class="node" onclick="openLab('node3')">NODE 03 - Encryption Lab</div>
    <div class="node" onclick="openLab('boss')">NODE 04 - AI FIREWALL (BOSS)</div>

    <div id="ai">
      🤖 AI TUTOR:
      <div id="aiText">Select a node to get guidance.</div>
    </div>
  </div>

  <!-- RIGHT: TERMINAL -->
  <div id="terminal">
    <h3>TERMINAL LAB</h3>
    <div id="out">Welcome to Cyber Academy SaaS</div>
    <input id="cmd" placeholder="enter command..." disabled>
  </div>

</div>

<script>

/* MATRIX */
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

function resize(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

const chars = "01ABCDEFGHIJKLMNOPQRSTUVWXYZ#$%&*@";
let drops = Array(Math.floor(window.innerWidth/14)).fill(1);

function draw(){
  ctx.fillStyle = "rgba(0,0,0,0.08)";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle = "#00ff66";
  ctx.font = "14px monospace";

  for(let i=0;i<drops.length;i++){
    ctx.fillText(chars[Math.floor(Math.random()*chars.length)], i*14, drops[i]*14);

    if(drops[i]*14 > canvas.height && Math.random()>0.975){
      drops[i]=0;
    }
    drops[i]++;
  }

  requestAnimationFrame(draw);
}
draw();

/* STATE */
let currentLab = null;
let xp = 0;

/* TERMINAL */
const out = document.getElementById("out");
const cmd = document.getElementById("cmd");
const aiText = document.getElementById("aiText");

function log(t){
  out.innerHTML += "<br>> " + t;
  out.scrollTop = out.scrollHeight;
}

/* LAB SYSTEM */
function openLab(id){
  currentLab = id;
  cmd.disabled = false;

  if(id==="node1"){
    aiText.innerText = "Try: ls, pwd, help";
    log("Entered Beginner Lab");
  }

  if(id==="node2"){
    aiText.innerText = "Try: scan, nmap, logs";
    log("Network Scan Lab loaded");
  }

  if(id==="node3"){
    aiText.innerText = "Try: decrypt, hash, analyze";
    log("Encryption Lab loaded");
  }

  if(id==="boss"){
    aiText.innerText = "AI FIREWALL is learning your behavior...";
    log("WARNING: AI Firewall Active");
  }

  xp += 10;
}

/* AI TUTOR (REAL API READY HOOK) */
async function askAI(question){
  aiText.innerText = "Thinking...";

  // 🔥 REAL GPT INTEGRATION POINT (BACKEND REQUIRED)
  // DO NOT put API key here in production frontend
  /*
  const res = await fetch("/api/ai", {
    method: "POST",
    body: JSON.stringify({ question })
  });
  const data = await res.json();
  return data.answer;
  */

  // SAFE SIMULATION RESPONSE (frontend fallback)
  const fallback = {
    "help": "Use commands like scan, nmap, ls, logs depending on lab.",
    "scan": "Simulated scan detects virtual nodes and services.",
    "boss": "AI Firewall adapts to repeated attack patterns."
  };

  return fallback[question] || "AI Tutor: Explore the lab to learn step by step.";
}

/* COMMAND ENGINE */
cmd.addEventListener("keydown", async (e)=>{
  if(e.key==="Enter"){
    let v = cmd.value;
    log(v);

    if(v==="help"){
      log("commands: ls | scan | nmap | logs | ai | xp");
    }

    else if(v==="ls"){
      log("file1.txt  config.sys  tool.sh");
      xp+=5;
    }

    else if(v==="scan"){
      log("Scanning virtual network...");
      xp+=10;
    }

    else if(v==="nmap"){
      log("Open ports detected (simulated): 22, 80, 443");
      xp+=10;
    }

    else if(v==="logs"){
      log("[INFO] system stable");
      log("[WARN] anomaly detected (simulated)");
      xp+=10;
    }

    else if(v.startsWith("ai")){
      const q = v.replace("ai ","");
      const ans = await askAI(q);
      aiText.innerText = ans;
      log("AI: " + ans);
    }

    else if(v==="xp"){
      log("XP: " + xp);
    }

    cmd.value="";
  }
});

</script>

</body>
</html>
