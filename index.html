<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Cyber Defense Command Console</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<style>
* { box-sizing: border-box; }
body {
  margin: 0;
  background: #000;
  color: #00ff9c;
  font-family: "Courier New", monospace;
  height: 100vh;
  overflow: hidden;
}

#screen {
  position: fixed;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}

.terminal {
  width: 82%;
  max-width: 1000px;
  height: 75%;
  border: 1px solid #00ff9c;
  padding: 20px;
  overflow-y: auto;
  box-shadow: 0 0 45px rgba(0,255,156,0.25);
}

.line {
  white-space: pre-wrap;
  line-height: 1.4;
}

.cursor {
  display: inline-block;
  width: 10px;
  background: #00ff9c;
  margin-left: 4px;
  animation: blink 1s infinite;
}

@keyframes blink {
  0%,50% { opacity: 1; }
  51%,100% { opacity: 0; }
}

.header {
  margin-bottom: 15px;
  color: #7dffca;
}

.status {
  margin-top: 10px;
  border-top: 1px solid #00ff9c;
  padding-top: 10px;
  font-size: 13px;
  color: #9affd7;
}
</style>
</head>
<body>

<div id="screen">
  <div class="terminal" id="terminal">
    <div class="header">
CYBER DEFENSE OPERATIONS CONSOLE
NODE: edge-gateway-01
CLEARANCE: SOC-LEVEL
    </div>
  </div>
</div>

<script>
const terminal = document.getElementById("terminal");

function addLine(text = "") {
  const div = document.createElement("div");
  div.className = "line";
  div.textContent = text;
  terminal.appendChild(div);
  terminal.scrollTop = terminal.scrollHeight;
}

function typeCommand(command, callback) {
  const line = document.createElement("div");
  line.className = "line";
  terminal.appendChild(line);

  let i = 0;
  const cursor = document.createElement("span");
  cursor.className = "cursor";

  function type() {
    if (i < command.length) {
      line.textContent += command.charAt(i);
      i++;
      terminal.scrollTop = terminal.scrollHeight;
      setTimeout(type, 40);
    } else {
      line.appendChild(cursor);
      setTimeout(() => {
        cursor.remove();
        callback && callback();
      }, 600);
    }
  }
  type();
}

function output(lines, delay = 300) {
  let i = 0;
  const interval = setInterval(() => {
    addLine(lines[i]);
    i++;
    if (i >= lines.length) clearInterval(interval);
  }, delay);
}

const sequence = [
  () => addLine("[BOOT] Initializing hardened kernel modules..."),
  () => addLine("[BOOT] Loading network inspection drivers..."),
  () => addLine("[BOOT] Establishing secure telemetry channels..."),
  () => addLine("[OK] System integrity verified."),
  () => addLine(""),

  () => typeCommand("root@defense-node:~# nmap -sS -Pn 10.0.0.0/24", () =>
    output([
      "Starting Nmap 7.94",
      "10.0.0.5   PORT 443/tcp   open  https",
      "10.0.0.7   PORT 22/tcp    open  ssh",
      "10.0.0.12  PORT 8080/tcp  filtered",
      "Scan completed: 256 hosts analyzed"
    ])
  ),

  () => typeCommand("root@defense-node:~# netstat -antp | grep ESTABLISHED", () =>
    output([
      "tcp  ESTABLISHED 10.0.0.5:443  203.0.113.45:53122",
      "tcp  ESTABLISHED 10.0.0.5:443  203.0.113.45:53124",
      "tcp  ESTABLISHED 10.0.0.7:22   198.51.100.19:49812"
    ])
  ),

  () => typeCommand("root@defense-node:~# tcpdump -nn dst port 443", () =>
    output([
      "IP 203.0.113.45 > 10.0.0.5: Flags [S]",
      "IP 203.0.113.45 > 10.0.0.5: Flags [S]",
      "Anomaly: repeated SYN packets detected"
    ])
  ),

  () => typeCommand("root@defense-node:~# iptables -A INPUT -s 203.0.113.45 -j DROP", () =>
    output([
      "Firewall rule applied successfully",
      "Traffic from 203.0.113.45 blocked"
    ])
  ),

  () => typeCommand("root@defense-node:~# whois 203.0.113.45", () =>
    output([
      "OrgName: ExampleNet Services",
      "Country: US",
      "Abuse Contact: abuse@example.net"
    ])
  ),

  () => addLine(""),
  () => addLine("[STATUS] Threat source isolated."),
  () => addLine("[STATUS] Network stability restored."),
  () => addLine("[STATUS] Continuous monitoring active."),

  () => {
    const status = document.createElement("div");
    status.className = "status";
    status.textContent = `
ACTIVE CONNECTIONS: 128
BLOCKED SOURCES: 14
FIREWALL RULES: 87
ALERT LEVEL: LOW
VOICE CHANNEL: READY (Push-to-Talk)
    `;
    terminal.appendChild(status);
  }
];

let step = 0;
function runSequence() {
  if (step < sequence.length) {
    sequence[step]();
    step++;
    setTimeout(runSequence, 1200);
  }
}

runSequence();
</script>

</body>
</html>
