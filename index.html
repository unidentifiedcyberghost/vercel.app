<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>WhiteHat-CyberLab</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
html,body {
  margin:0;
  padding:0;
  background:#000;
  color:#00ffff;
  font-family: "Courier New", monospace;
  overflow:hidden;
}

/* ===== BOOT ===== */
#boot {
  position:fixed;
  inset:0;
  display:grid;
  grid-template-columns: repeat(3, 1fr);
  grid-template-rows: repeat(2, 1fr);
  gap:6px;
  padding:6px;
  background:#000;
}

.tty {
  border:1px solid #003333;
  padding:6px;
  font-size:11px;
  overflow:hidden;
  white-space:pre;
}

.hidden { display:none; }

/* ===== MAIN ===== */
#main {
  position:fixed;
  inset:0;
  display:flex;
  flex-direction:column;
}

#topbar {
  padding:8px 12px;
  border-bottom:1px solid #003333;
  display:flex;
  justify-content:space-between;
}

#map {
  flex:1;
}

#footer {
  font-size:11px;
  padding:6px;
  border-top:1px solid #003333;
  display:flex;
  justify-content:space-between;
  color:#88ffff;
}
</style>
</head>

<body>

<!-- ===== BOOT SCREEN ===== -->
<div id="boot">
  <div class="tty" id="tty0"></div>
  <div class="tty" id="tty1"></div>
  <div class="tty" id="tty2"></div>
  <div class="tty" id="tty3"></div>
  <div class="tty" id="tty4"></div>
  <div class="tty" id="tty5"></div>
</div>

<!-- ===== MAIN UI ===== -->
<div id="main" class="hidden">
  <div id="topbar">
    <div>WhiteHat-CyberLab</div>
    <div>ALIAS: <strong>unidentifiedcyberghost</strong></div>
  </div>
  <div id="map"></div>
  <div id="footer">
    <div>
      github: https://github.com/unidentifiedcyberghost |
      instagram: https://www.instagram.com/pinoyunknown
    </div>
    <div id="geoInfo"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.158/build/three.min.js"></script>

<script>
/* ===== BOOT DATA ===== */
const bootLines = [
  "[ OK ] Initializing kernel modules",
  "[ OK ] Loading netfilter, tcp/ip stack",
  "[ OK ] Mounting secure volumes",
  "[INFO] SOC environment bootstrap",
  "[INFO] Threat feed prefetch",
  "[INFO] Analyst alias: unidentifiedcyberghost",
  "[INFO] Team White Hat",
  "[INFO] Anonymous collective node detected",
  "[INFO] PinoyUnknown identity loaded",
  "[INFO] Web crawling modules",
  "[INFO] Network topology mapping",
  "[INFO] SQL injection pattern database",
  "[INFO] NMAP fingerprint tables",
  "[INFO] Defensive heuristics loaded",
  "[INFO] Cyber defense grid online"
];

const ttys = [...Array(6)].map((_,i)=>document.getElementById("tty"+i));

function startBoot() {
  let counters = Array(6).fill(0);
  const interval = setInterval(() => {
    ttys.forEach((tty, i) => {
      tty.textContent += bootLines[Math.floor(Math.random()*bootLines.length)] + "\n";
      tty.scrollTop = tty.scrollHeight;
      counters[i]++;
    });
    if (counters[0] > 80) {
      clearInterval(interval);
      document.getElementById("boot").classList.add("hidden");
      document.getElementById("main").classList.remove("hidden");
      initMap();
    }
  }, 40);
}

/* ===== MAP ===== */
async function initMap() {
  const scene = new THREE.Scene();
  const camera = new THREE.OrthographicCamera(
    -window.innerWidth/2,
     window.innerWidth/2,
     window.innerHeight/2,
    -window.innerHeight/2,
     1, 1000
  );
  camera.position.z = 10;

  const renderer = new THREE.WebGLRenderer({ antialias:true });
  renderer.setSize(window.innerWidth, window.innerHeight-60);
  document.getElementById("map").appendChild(renderer.domElement);

  const texture = new THREE.TextureLoader().load(
    "https://raw.githubusercontent.com/alenpepaxx1/Global-Cyber-Threat-Map/main/assets/world.png"
  );

  const plane = new THREE.Mesh(
    new THREE.PlaneGeometry(1600,800),
    new THREE.MeshBasicMaterial({ map:texture })
  );
  scene.add(plane);

  // GEO
  const geo = await fetch("/api/geo").then(r=>r.json());
  document.getElementById("geoInfo").textContent =
    `${geo.ip} | ${geo.country} | ${geo.org}`;

  const dot = new THREE.Mesh(
    new THREE.CircleGeometry(6,16),
    new THREE.MeshBasicMaterial({ color:0x00ffff })
  );
  dot.position.set(geo.lon*4, geo.lat*4, 2);
  scene.add(dot);

  // FEEDS
  const feed = await fetch("/api/feeds").then(r=>r.json());
  feed.events.forEach(e=>{
    const mat = new THREE.LineBasicMaterial({ color:0xff0040 });
    const pts = [
      new THREE.Vector3(e.src.lon*4, e.src.lat*4, 3),
      new THREE.Vector3(e.dst.lon*4, e.dst.lat*4, 3)
    ];
    const g = new THREE.BufferGeometry().setFromPoints(pts);
    scene.add(new THREE.Line(g, mat));
  });

  function animate() {
    requestAnimationFrame(animate);
    renderer.render(scene, camera);
  }
  animate();
}

startBoot();
</script>

</body>
</html>
